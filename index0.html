<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>InKable... La nueva forma de ver TV</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family:Arial,sans-serif;
    background:#121212;
    color:#fff;
    padding:15px;
    user-select:none;
    cursor:default;
}

h1{
    text-align:center;
    font-size:22px;
    margin-bottom:5px;
}

.note{
    text-align:center;
    font-size:14px;
    margin-bottom:15px;
    color:#ccc;
}

button{
    padding:8px 16px;
    margin:10px auto;
    font-size:14px;
    border-radius:4px;
    border:none;
    cursor:pointer;
    background:#850810;
    color:white;
    display:block;
}

button:hover{
    background:#6f070d;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
    background:#1e1e1e;
}

th,td{
    padding:8px;
    border:1px solid #333;
    font-size:12px;
}

th{
    background:#222;
}

tr:nth-child(even){
    background:#181818;
}

.center{
    text-align:center;
}

.action-link{
    color:#FF0000;
    text-decoration:none;
    font-weight:bold;
    cursor:pointer;
}

.logo-box{
    width:44px;
    height:44px;
    background:#ffffff;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    border-radius:4px;
}

.logo{
    width:40px;
    height:40px;
    object-fit:contain;
}

#playerBox{
    margin-top:20px;
    display:none;
}

video{
    width:100%;
    max-height:500px;
    background:black;
}
</style>

<script>
// protección básica
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('dragstart',e=>e.preventDefault());

</script>
</head>

<body>

<div class="note">
Selecciona un canal para reproducirlo directamente en el navegador.
</div>

<button onclick="loadList()">Actualizar Lista</button>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>Grupo</th>
<th class="center">Logo</th>
<th class="center">Play</th>
</tr>
</thead>

<tbody id="channelsTable"></tbody>
</table>

<div id="playerBox">
<video id="videoPlayer" controls autoplay playsinline></video>
</div>

<script>

const LIST_URL="https://ltvplus.github.io/%7C%3Er3M!uM.m3u";

function openChannel(url){

    const player=document.getElementById("videoPlayer");
    const box=document.getElementById("playerBox");

    player.src=url;
    box.style.display="block";

    player.play();
}

async function loadList(){

    const tbody=document.getElementById("channelsTable");

    tbody.innerHTML="<tr><td colspan='4' style='text-align:center'>Cargando lista...</td></tr>";

    try{

        const response=await fetch(LIST_URL+"?t="+Date.now());
        const data=await response.text();

        parseM3U(data);

    }catch(err){

        tbody.innerHTML="<tr><td colspan='4' style='text-align:center'>Error cargando lista</td></tr>";

    }
}

function parseM3U(data){

    const lines=data.split('\n');
    const tbody=document.getElementById("channelsTable");

    tbody.innerHTML="";

    let channel={};

    lines.forEach(line=>{

        line=line.trim();

        if(line.startsWith("#EXTINF")){

            const name=line.split(",")[1]||"Sin nombre";

            const group=line.match(/group-title="(.*?)"/);
            const logo=line.match(/tvg-logo="(.*?)"/);

            channel={
                name:name,
                group:group?group[1]:"Sin grupo",
                logo:logo?logo[1]:"",
                url:""
            };

        }else if(line && !line.startsWith("#")){

            channel.url=line;

            const logoHTML=channel.logo
                ? `<div class="logo-box"><img class="logo" loading="lazy" src="${channel.logo}" onerror="this.style.display='none'"></div>`
                : "";

            const row=document.createElement("tr");

            row.innerHTML=`

<td>${channel.name}</td>
<td>${channel.group}</td>
<td class="center">${logoHTML}</td>
<td class="center">
<span class="action-link" onclick='openChannel("${channel.url}")'>Abrir</span>
</td>

`;

            tbody.appendChild(row);

        }

    });

}

document.addEventListener("DOMContentLoaded",loadList);

</script>

</body>
</html>
