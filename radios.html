<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Autoradio Realista</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin: 0;
  background: #222;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Arial', sans-serif;
}

/* Carcasa del radio */
.container {
  width: 450px;
  background: #111;
  border: 4px solid #555;
  border-radius: 15px;
  box-shadow: 0 0 20px #000;
  padding: 15px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Pantalla LED tipo segmentos */
.display {
  width: 100%;
  height: 60px;
  background: #000;
  color: #0f0;
  font-family: 'Courier New', monospace;
  font-size: 18px;
  text-align: center;
  line-height: 60px;
  letter-spacing: 2px;
  border-radius: 5px;
  border: 2px inset #0f0;
  margin-bottom: 15px;
}

/* Controles tipo botones físicos */
.controls {
  display: flex;
  justify-content: space-between;
  width: 100%;
  margin-bottom: 15px;
}

button {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: 2px solid #0f0;
  background: #111;
  color: #0f0;
  font-weight: bold;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 0 5px #0f0;
  transition: 0.2s;
}

button:hover {
  background: #0f0;
  color: #000;
}

/* Lista de estaciones tipo frecuencia */
.list {
  width: 100%;
  max-height: 200px;
  overflow-y: auto;
  background: #111;
  border: 2px solid #0f0;
  border-radius: 5px;
  padding: 5px;
  font-family: monospace;
  color: #0f0;
}

.item {
  padding: 8px;
  border-bottom: 1px solid #0f0;
  cursor: pointer;
}

.item:hover, .item.active {
  background: #0f0;
  color: #000;
  font-weight: bold;
}

audio {
  display: none;
}
</style>
</head>

<body>
<div class="container">
  <div class="display" id="nowPlaying">SELECCIONE RADIO</div>

  <div class="controls">
    <button onclick="prevStation()">⏮</button>
    <button onclick="stop()">⏹</button>
    <button onclick="nextStation()">⏭</button>
  </div>

  <div class="list" id="playlist"></div>

  <audio id="audio"></audio>
</div>

<script>
const urlM3U = "https://raw.githubusercontent.com/ltvplus/ltvplus.github.io/main/radiospe.m3u";
let stations = [];
let currentIndex = -1;
let hls = null;

async function loadM3U() {
  const res = await fetch(urlM3U);
  const text = await res.text();
  const lines = text.split("\n");

  for (let i = 0; i < lines.length; i++) {
    if (lines[i].includes("#EXTINF")) {
      const name = lines[i].split(",").pop().trim();
      const url = lines[i + 1]?.trim();
      if(url && url.startsWith("http")) stations.push({name, url});
    }
  }
  renderList();
}

function renderList() {
  const container = document.getElementById("playlist");
  container.innerHTML = "";
  stations.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerText = s.name;
    div.onclick = () => selectStation(i);
    container.appendChild(div);
  });
}

function selectStation(i) {
  currentIndex = i;
  const s = stations[i];
  document.getElementById("nowPlaying").innerText = s.name;
  document.querySelectorAll(".item").forEach((el, idx) => {
    el.classList.toggle("active", idx === i);
  });
  playCurrent();
}

function playCurrent() {
  if(currentIndex === -1) return;
  const s = stations[currentIndex];
  const audio = document.getElementById("audio");
  if(hls) { hls.destroy(); hls = null; }

  if(s.url.includes(".m3u8")) {
    if(Hls.isSupported()){
      hls = new Hls();
      hls.loadSource(s.url);
      hls.attachMedia(audio);
      hls.on(Hls.Events.MANIFEST_PARSED, () => audio.play());
    } else {
      audio.src = s.url;
      audio.play();
    }
  } else {
    audio.src = s.url;
    audio.play().catch(() => alert("No se puede reproducir el stream"));
  }

  audio.onerror = () => alert("Stream no compatible o bloqueado");
}

function stop() {
  const audio = document.getElementById("audio");
  audio.pause();
  audio.src = "";
  if(hls){ hls.destroy(); hls=null; }
}

function prevStation(){
  if(stations.length === 0) return;
  let i = currentIndex - 1;
  if(i<0) i = stations.length - 1;
  selectStation(i);
}

function nextStation(){
  if(stations.length === 0) return;
  let i = currentIndex + 1;
  if(i>=stations.length) i = 0;
  selectStation(i);
}

loadM3U();
</script>
</body>
</html>
