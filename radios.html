<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>InRadio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- HLS -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #1f1f2e, #0a0a0f);
  font-family: 'Segoe UI', sans-serif;
  color: #fff;
}

.app {
  width: 460px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

.header {
  text-align: center;
  margin-bottom: 15px;
}

.title {
  font-size: 22px;
  font-weight: bold;
}

.display {
  display: flex;
  gap: 12px;
  background: linear-gradient(135deg, #111, #1c1c2b);
  border-radius: 15px;
  padding: 15px;
  align-items: center;
}

.cover {
  width: 80px;
  height: 80px;
  border-radius: 10px;
  background: #000;
  background-size: cover;
  background-position: center;
}

.info {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.now {
  font-size: 20px;
  font-weight: bold;
  color: #0ff;
}

.status {
  font-size: 14px;
  opacity: 0.5;
  letter-spacing: 2px;
}

.eq {
  width: 70px;
  height: 50px;
  background: url("https://cdn.pixabay.com/animation/2025/09/20/21/46/21-46-55-572_512.gif") center/contain no-repeat;
  display: none;
}

.controls {
  display: flex;
  justify-content: space-around;
  margin: 20px 0;
}

.btn {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(145deg, #1a1a2e, #0a0a0f);
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  font-size: 20px;
  transition: 0.2s;
}

.btn:hover {
  color: #0ff;
  transform: scale(1.1);
}

.list {
  max-height: 200px;
  overflow-y: auto;
}

.item {
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 5px;
  cursor: pointer;
  background: rgba(255,255,255,0.05);
  transition: 0.2s;
}

.item:hover {
  background: rgba(0,255,255,0.2);
}

.active {
  background: #0ff;
  color: #000;
  font-weight: bold;
}

audio {
  display: none;
}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <div class="title">𝗥𝗔𝗗𝗜𝗢 𝗣𝗟𝗔𝗬𝗘𝗥 - 𝗟𝗜𝗠𝗔</div>
  </div>

  <div class="display">
    <div class="cover" id="cover"></div>

    <div class="info">
      <div class="now" id="nowPlaying">Selecciona una radio</div>
      <div class="status" id="status">● EN VIVO</div>
    </div>

    <div class="eq" id="equalizer"></div>
  </div>

  <div class="controls">
    <div class="btn" onclick="prevStation()">⏮</div>
    <div class="btn" onclick="stop()">⏹</div>
    <div class="btn" onclick="nextStation()">⏭</div>
  </div>

  <div class="list" id="playlist"></div>

  <audio id="audio"></audio>
</div>

<script>
const urlM3U = "https://raw.githubusercontent.com/ltvplus/ltvplus.github.io/main/radiospe.m3u";

let stations = [];
let currentIndex = -1;
let hls = null;

async function loadM3U() {
  const res = await fetch(urlM3U);
  const text = await res.text();
  const lines = text.split("\n");

  for (let i = 0; i < lines.length; i++) {
    if (lines[i].includes("#EXTINF")) {
      const line = lines[i];
      const name = line.split(",").pop().trim();

      const logoMatch = line.match(/tvg-logo="(.*?)"/);
      const logo = logoMatch ? logoMatch[1] : "";

      const url = lines[i + 1]?.trim();

      if (url && url.startsWith("http")) {
        stations.push({ name, url, logo });
      }
    }
  }

  renderList();
}

function renderList() {
  const container = document.getElementById("playlist");
  container.innerHTML = "";

  stations.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerText = s.name;
    div.onclick = () => selectStation(i);
    container.appendChild(div);
  });
}

function selectStation(i) {
  currentIndex = i;
  const s = stations[i];

  document.getElementById("nowPlaying").innerText = s.name;

  const cover = document.getElementById("cover");
  cover.style.backgroundImage = s.logo ? `url(${s.logo})` : "none";

  document.querySelectorAll(".item").forEach((el, idx) => {
    const isActive = idx === i;
    el.classList.toggle("active", isActive);

    if (isActive) {
      el.scrollIntoView({ behavior: "smooth", block: "center" });
    }
  });

  playCurrent();
}

function playCurrent() {
  if (currentIndex === -1) return;

  const s = stations[currentIndex];
  const audio = document.getElementById("audio");
  const status = document.getElementById("status");
  const eq = document.getElementById("equalizer");

  // limpiar HLS previo
  if (hls) {
    hls.destroy();
    hls = null;
  }

  // detectar HLS
  if (s.url.includes(".m3u8")) {

    if (Hls.isSupported()) {
      hls = new Hls();
      hls.loadSource(s.url);
      hls.attachMedia(audio);

      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        audio.play();
        status.style.opacity = "1";
        eq.style.display = "block";
      });

      hls.on(Hls.Events.ERROR, () => {
        status.style.opacity = "0.3";
        eq.style.display = "none";
      });

    } else {
      audio.src = s.url;
      audio.play();
    }

  } else {
    audio.src = s.url;
    audio.play()
      .then(() => {
        status.style.opacity = "1";
        eq.style.display = "block";
      })
      .catch(() => {
        status.style.opacity = "0.3";
        eq.style.display = "none";
      });
  }

  audio.onerror = () => {
    status.style.opacity = "0.3";
    eq.style.display = "none";
  };
}

function stop() {
  const audio = document.getElementById("audio");
  const status = document.getElementById("status");
  const eq = document.getElementById("equalizer");

  audio.pause();
  audio.src = "";

  if (hls) {
    hls.destroy();
    hls = null;
  }

  status.style.opacity = "0.4";
  eq.style.display = "none";
}

function prevStation() {
  if (stations.length === 0) return;
  currentIndex = (currentIndex - 1 + stations.length) % stations.length;
  selectStation(currentIndex);
}

function nextStation() {
  if (stations.length === 0) return;
  currentIndex = (currentIndex + 1) % stations.length;
  selectStation(currentIndex);
}

// Control remoto Android TV
document.addEventListener("keydown", (e) => {
  switch(e.key) {
    case "ArrowLeft":
      prevStation();
      break;
    case "ArrowRight":
      nextStation();
      break;
    case "Enter":
    case "MediaPlayPause":
      const audio = document.getElementById("audio");
      if (audio.paused) playCurrent();
      else stop();
      break;
    case "MediaStop":
      stop();
      break;
  }
});

loadM3U();

// ================= PROTECCIÓN BÁSICA =================

// Bloquear clic derecho
document.addEventListener("contextmenu", e => e.preventDefault());

// Bloquear teclas comunes de inspección
document.addEventListener("keydown", function(e) {

  // F12
  if (e.key === "F12") {
    e.preventDefault();
  }

  // Ctrl+Shift+I / Ctrl+Shift+J / Ctrl+U / Ctrl+S / Ctrl+C
  if (e.ctrlKey && (
      e.key === "u" ||
      e.key === "s" ||
      e.key === "c" ||
      (e.shiftKey && (e.key === "I" || e.key === "J"))
  )) {
    e.preventDefault();
  }

});

// Bloquear selección de texto
document.addEventListener("selectstart", e => e.preventDefault());

// Detectar DevTools abiertos
(function() {
  let devtoolsOpen = false;

  setInterval(() => {
    const widthThreshold = window.outerWidth - window.innerWidth > 160;
    const heightThreshold = window.outerHeight - window.innerHeight > 160;

    if (widthThreshold || heightThreshold) {
      if (!devtoolsOpen) {
        devtoolsOpen = true;
        document.body.innerHTML = "<h1 style='color:white;text-align:center;margin-top:40%'>Acceso restringido</h1>";
      }
    } else {
      devtoolsOpen = false;
    }
  }, 1000);
})();

// Desactivar consola
console.log = function() {};
console.warn = function() {};
console.error = function() {};

</script>

</body>
</html>
