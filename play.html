<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
  background: black;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<script>
const video = document.getElementById("video");
const videoSrc = "http://38.7.101.90:8000/play/a1es/index.m3u8";

// Configuración HLS
function initHLS() {
  if(Hls.isSupported()){
    const hls = new Hls({
      maxBufferLength: 30,
      maxMaxBufferLength: 60,
      startLevel: -1,
      capLevelToPlayerSize: true,
      lowLatencyMode: true,
      backBufferLength: 90
    });

    hls.loadSource(videoSrc);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      attemptPlay();
    });

    hls.on(Hls.Events.ERROR, (event, data) => {
      console.error("Error HLS:", data);
    });
  } else if(video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = videoSrc;
    video.addEventListener('loadedmetadata', attemptPlay);
  }
}

// Función para intentar reproducir con sonido
function attemptPlay() {
  video.play().catch(err => {
    console.warn("Autoplay bloqueado, esperando interacción del usuario...", err);
    // Esperar el primer click o toque
    const resume = () => {
      video.play().catch(err => console.error("No se pudo reproducir:", err));
      document.body.removeEventListener('click', resume);
      document.body.removeEventListener('touchstart', resume);
    };
    document.body.addEventListener('click', resume);
    document.body.addEventListener('touchstart', resume);
  });
}

// Forzar fullscreen opcional
function tryFullscreen() {
  if(document.documentElement.requestFullscreen){
    document.documentElement.requestFullscreen().catch(()=>{});
  }
}

// Inicializar
initHLS();
tryFullscreen();

</script>

</body>
</html>
