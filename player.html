<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MOVIES</title>

<style>

body{
font-family:Arial,sans-serif;
text-align:center;
background-color:#141414;
color:#ffffff;
user-select:none;
margin:0;
}

#grupo-filtros{
margin:20px 10px 0;
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

#grupo-filtros button,
.boton-filtro{
background-color:#333;
color:white;
border:none;
padding:8px 16px;
border-radius:8px;
cursor:pointer;
transition:background-color .2s;
}

#grupo-filtros button:hover,
.boton-filtro:hover{
background-color:#e50914;
}

#grupo-filtros button.activo{
background-color:#e50914;
font-weight:bold;
}

#search-container{
margin:20px;
}

#search-bar{
width:100%;
max-width:500px;
padding:10px;
border-radius:10px;
border:1px solid #444;
background-color:#1e1e1e;
color:white;
font-size:16px;
}

#lista{
max-width:90%;
margin:20px auto;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:15px;
justify-content:center;
}

.item{
cursor:pointer;
border:1px solid #444;
padding:10px;
background:#1e1e1e;
border-radius:10px;
display:flex;
flex-direction:column;
align-items:center;
transition:transform .2s;
outline:none;
}

.item:hover,
.item:focus{
transform:scale(1.05);
border-color:#e50914;
}

.item img{
width:100%;
border-radius:5px;
}

.item span{
margin-top:5px;
font-size:14px;
text-align:center;
}

.fullscreen-video{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:9999;
}

.fullscreen-video video{
width:100%;
height:100%;
object-fit:contain;
}

</style>
</head>

<body>

<div id="main-content">

<div id="grupo-filtros"></div>

<div id="search-container">
<input id="search-bar" type="text" placeholder="Buscar por nombre de pelicula..." oninput="filtrarLista()"/>
</div>

<div id="lista"></div>

<div style="margin:30px 0;">
<button class="boton-filtro" onclick="window.location.href='https://la.movie/'">
Más Contenido
</button>
</div>

<div id="fullscreen-video" class="fullscreen-video">
<video id="video-player" controls autoplay controlsList="nodownload"></video>
</div>

</div>

<!-- HLS PLAYER -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

document.addEventListener('contextmenu',e=>e.preventDefault());

const videoPlayer=document.getElementById("video-player");
const fullscreenVideo=document.getElementById("fullscreen-video");
const listaElementos=document.getElementById("lista");

let listaCanales=[];
let grupos=new Set();
let grupoActual="Todos";
let hls;

cargarLista();

async function cargarLista(){

const url="https://ltvplus.github.io/|>r3M!uM.m3u";

try{

const response=await fetch(url);
const data=await response.text();

const lineas=data.split("\n");

listaCanales=[];
grupos=new Set(["Todos"]);
listaElementos.innerHTML="";

for(let i=0;i<lineas.length;i++){

let linea=lineas[i].trim();

if(linea.startsWith("#EXTINF")){

const nombre=linea.split(",")[1]||"Desconocido";

const logoMatch=linea.match(/tvg-logo="(.*?)"/);
const logo=logoMatch?logoMatch[1]:"";

const grupoMatch=linea.match(/group-title="(.*?)"/);
const grupo=grupoMatch?grupoMatch[1]:"Otros";

grupos.add(grupo);

let urlVideo=lineas[i+1]?.trim()||"";

if(urlVideo){

const item=document.createElement("div");
item.classList.add("item");

if(logo){
const img=document.createElement("img");
img.src=logo;
item.appendChild(img);
}

const texto=document.createElement("span");
texto.textContent=nombre;

item.appendChild(texto);

item.onclick=()=>playVideo(urlVideo);

listaCanales.push({nombre,item,urlVideo,grupo});

}

}

}

renderGrupos();
filtrarLista();

}catch(error){

alert("No se pudo cargar la lista");

}

}

function renderGrupos(){

const container=document.getElementById("grupo-filtros");

container.innerHTML="";

Array.from(grupos).forEach(grupo=>{

const btn=document.createElement("button");

btn.textContent=grupo;

if(grupo===grupoActual)btn.classList.add("activo");

btn.onclick=()=>{

grupoActual=grupo;

renderGrupos();

filtrarLista();

};

container.appendChild(btn);

});

}

function filtrarLista(){

const filtro=document.getElementById("search-bar").value.toLowerCase();

listaElementos.innerHTML="";

listaCanales.forEach(canal=>{

const coincide=canal.nombre.toLowerCase().includes(filtro);

const enGrupo=grupoActual==="Todos"||canal.grupo===grupoActual;

if(coincide&&enGrupo){

listaElementos.appendChild(canal.item);

}

});

}

let ultimaPosScroll=0;

function playVideo(url){

ultimaPosScroll=window.scrollY;

fullscreenVideo.style.display="block";

if(hls){
hls.destroy();
}

if(url.includes(".m3u8")){

if(Hls.isSupported()){

hls=new Hls();

hls.loadSource(url);

hls.attachMedia(videoPlayer);

hls.on(Hls.Events.MANIFEST_PARSED,function(){
videoPlayer.play();
});

}else if(videoPlayer.canPlayType("application/vnd.apple.mpegurl")){

videoPlayer.src=url;
videoPlayer.play();

}

}else{

videoPlayer.src=url;
videoPlayer.play();

}

fullscreenVideo.requestFullscreen?.();

}

function exitFullscreen(){

fullscreenVideo.style.display="none";

videoPlayer.pause();

window.scrollTo(0,ultimaPosScroll);

}

document.addEventListener("fullscreenchange",()=>{
if(!document.fullscreenElement){
exitFullscreen();
}
});

</script>

</body>
</html>
